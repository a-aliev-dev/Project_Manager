<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestBoard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>QuestBoard</h1>
    <p>Gamified Project Management for enterprises</p>
  </header>

  <nav>
    <a href="#features">Features</a>
    <a href="#form">New Task</a>
  </nav>

  <main>
    <section id="features">
      <h2>Features</h2>
      <article>
        <h3>XP System</h3>
        <p>Teams earn points for completing tasks.</p>
      </article>
    </section>

    <section id="form">
      <h2>Create a New Task</h2>
      <form>
        <label for="task-title">Task title</label>
        <input type="text" id="task-title" name="task-title" />

        <button type="submit">Add Task</button>
      </form>
    </section>
  </main>

  <footer>
    <p>QuestBoard</p>
  </footer>
</body>
</html>
